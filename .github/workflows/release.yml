# Publishes `rerun-lerobot` to PyPI when a version tag is pushed.
#
# Uses PyPI Trusted Publishing (OpenID Connect) — no API token is stored
# anywhere. GitHub mints a short-lived OIDC token that PyPI verifies against
# the trusted publisher configured for this project.
#
# One-time setup (see RELEASES.md):
#   - PyPI: add a trusted publisher for owner `rerun-io`, repo `rerun-lerobot`,
#     workflow `release.yml`, environment `release`.
#   - GitHub: create an environment named `release`.

name: Release

on:
  push:
    tags:
      # Version tags like `0.2.0`.
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/rerun-lerobot
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="$(uv run --no-project python -c 'import tomllib, pathlib; print(next(l.split("=")[1].strip().strip(chr(34)) for l in pathlib.Path("rerun_lerobot/__init__.py").read_text().splitlines() if l.startswith("__version__")))')"
          if [[ "${tag}" != "${version}" ]]; then
            echo "Tag ${tag} does not match package version ${version}" >&2
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
